name: N11 Marketplace CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  # ══════════════════════════════════════════════════════════════════════════════
  # BACKEND BUILD & TEST
  # ══════════════════════════════════════════════════════════════════════════════
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'oracle'
          cache: 'maven'
      - name: Build with Maven
        run: mvn clean install -DskipTests -B
        working-directory: backend

  # ══════════════════════════════════════════════════════════════════════════════
  # DOCKERIZE & PUSH (ALL SERVICES)
  # ══════════════════════════════════════════════════════════════════════════════
  docker:
    name: Dockerize & Push
    needs: [backend]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Tüm mikroservislerini buraya ekliyoruz!
        service: [
          api-gateway,
          config-server,
          discovery-server,
          product-service,
          basket-service,
          order-service,
          payment-service,
          inventory-service,
          notification-service,
          mcp-ai-server
        ]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'oracle'
          cache: 'maven'

      - name: Build Backend JARs (Skip Tests)
        run: mvn clean install -DskipTests -B
        working-directory: backend

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/519550996615/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deployer@n11-ecommerce.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/${{ matrix.service }}
          push: true
          tags: |
            europe-west3-docker.pkg.dev/n11-ecommerce/n11-repo/${{ matrix.service }}:${{ github.sha }}
            europe-west3-docker.pkg.dev/n11-ecommerce/n11-repo/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════════════════════════════════════
  # FRONTEND BUILD & PUSH
  # ══════════════════════════════════════════════════════════════════════════════
  frontend:
    name: Dockerize & Push (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/519550996615/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deployer@n11-ecommerce.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            europe-west3-docker.pkg.dev/n11-ecommerce/n11-repo/frontend:${{ github.sha }}
            europe-west3-docker.pkg.dev/n11-ecommerce/n11-repo/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════════════════════════════════════
  # DEPLOY TO GKE
  # ══════════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to GKE
    needs: [docker, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/519550996615/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deployer@n11-ecommerce.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_ZONE }}

      - name: Deploy Manifests
        run: |
          # Update image tags for all backend services
          for service in api-gateway config-server discovery-server product-service basket-service order-service payment-service inventory-service notification-service mcp-ai-server; do
            sed -i "s|image: .*/$service:.*|image: europe-west3-docker.pkg.dev/n11-ecommerce/n11-repo/$service:${{ github.sha }}|g" k8s/backend.yaml
          done
          
          # Update frontend image tag
          sed -i "s|image: .*/frontend:.*|image: europe-west3-docker.pkg.dev/n11-ecommerce/n11-repo/frontend:${{ github.sha }}|g" k8s/frontend.yaml
          
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/keycloak-configmap.yaml
          kubectl apply -f k8s/infra.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml

      - name: Verify Deployment
        continue-on-error: true
        run: |
          echo "⏳ Waiting for deployments (5 min timeout)..."
          kubectl rollout status deployment/api-gateway --timeout=300s || true
          kubectl rollout status deployment/config-server --timeout=300s || true
          echo ""
          echo "📋 Current pod status:"
          kubectl get pods