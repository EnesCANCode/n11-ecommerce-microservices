name: N11 Marketplace CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  # ══════════════════════════════════════════════════════════════════════════════
  # BACKEND BUILD & TEST
  # ══════════════════════════════════════════════════════════════════════════════
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'oracle'
          cache: maven

      - name: Build & Test (Maven)
        run: mvn clean install -B
        working-directory: backend

      - name: Upload Test Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/**/target/surefire-reports/

  # ══════════════════════════════════════════════════════════════════════════════
  # FRONTEND BUILD
  # ══════════════════════════════════════════════════════════════════════════════
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          npm ci
          npm run build
        working-directory: frontend

  # ══════════════════════════════════════════════════════════════════════════════
  # KUBERNETES VALIDATION
  # ══════════════════════════════════════════════════════════════════════════════
  kubernetes:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install and Run Kubeconform
        run: |
          wget https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/
          kubeconform -summary k8s/ 

  # ══════════════════════════════════════════════════════════════════════════════
  # DOCKERIZE (ONLY ON MAIN PUSH)
  # ══════════════════════════════════════════════════════════════════════════════
  docker:
    name: Dockerize & Push
    needs: [backend, frontend, kubernetes]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'oracle'
          cache: maven

      - name: Build Backend JARs (Skip Tests)
        run: mvn clean install -DskipTests -B
        working-directory: backend

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/519550996615/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deployer@n11-ecommerce.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./backend/api-gateway
          push: true
          tags: |
            europe-west3-docker.pkg.dev/n11-ecommerce/n11-repo/api-gateway:${{ github.sha }}
            europe-west3-docker.pkg.dev/n11-ecommerce/n11-repo/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════════════════════════════════════
  # DEPLOY TO GKE
  # ══════════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to GKE
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/519550996615/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deployer@n11-ecommerce.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_ZONE }}

      - name: Deploy Manifests
        run: |
          # Replace image tags in manifests with the current SHA
          sed -i "s|image: .*/api-gateway:.*|image: europe-west3-docker.pkg.dev/n11-ecommerce/n11-repo/api-gateway:${{ github.sha }}|g" k8s/backend.yaml
          
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/infra.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Verify Deployment
        run: kubectl rollout status deployment/api-gateway