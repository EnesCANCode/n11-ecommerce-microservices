name: N11 Marketplace CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ══════════════════════════════════════════════════════════════════════════════
  # BACKEND BUILD & TEST
  # ══════════════════════════════════════════════════════════════════════════════
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'oracle'
          cache: maven

      - name: Build & Test (Maven)
        run: mvn clean install -B
        working-directory: backend

      - name: Upload Test Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/**/target/surefire-reports/

  # ══════════════════════════════════════════════════════════════════════════════
  # FRONTEND BUILD
  # ══════════════════════════════════════════════════════════════════════════════
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          npm ci
          npm run build
        working-directory: frontend

  # ══════════════════════════════════════════════════════════════════════════════
  # KUBERNETES VALIDATION
  # ══════════════════════════════════════════════════════════════════════════════
  kubernetes:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install and Run Kubeconform
        run: |
          wget https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/
          kubeconform -summary k8s/ 

  # ══════════════════════════════════════════════════════════════════════════════
  # DOCKERIZE (ONLY ON MAIN PUSH)
  # ══════════════════════════════════════════════════════════════════════════════
  docker:
    name: Dockerize & Push
    needs: [backend, frontend, kubernetes]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'oracle'
          cache: maven

      - name: Build Backend JARs (Skip Tests)
        run: mvn clean install -DskipTests -B
        working-directory: backend
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Note: For real push, you would add login step here:
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build API Gateway Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/api-gateway
          push: false # Set to true when registry is configured
          tags: n11/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
