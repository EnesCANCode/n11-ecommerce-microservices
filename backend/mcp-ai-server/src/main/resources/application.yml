server:
  port: 8090

spring:
  application:
    name: mcp-ai-server
  ai:
    mcp:
      server:
        name: n11-product-search
        version: 1.0.0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
